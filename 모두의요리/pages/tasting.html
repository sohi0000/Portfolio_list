<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common/global.css">
  <link rel="stylesheet" href="/css/pages/tasting.css">
  <link rel="stylesheet" href="/css/common/swiper-bundle.min.css">
  <title>모두의 요리</title>
</head>
<body>
  <header id="header"></header>
  
  <main>
    <section class="tasTingSection">
      <div class="smapleTest smapleTest1 active">
        <div class="flexCenter flexCol">
          <p class="desc">오늘 (저녁)이 고민된다면?</p>
          <p class="title">입맛테스트로</p>
          <p class="title">빠르게 추천받기!</p>
          <img src="/img/bgImg/tastingImg1.png" alt="tasting img" class="tastingImg">
          <button class="headlineText smapleTest1Btn">입맛테스트 시작!</button>
        </div>
        <img src="/img/bgImg/foodImg1.png" alt="food img" class="foodImg foodImg1">
        <img src="/img/bgImg/foodImg2.png" alt="food img" class="foodImg foodImg2">
      </div>
      <div class="smapleTest smapleTest2 ">
        <div class="flexCenter flexCol">
          <p class="pagination title2Text">1/5</p>
          <div class="pagination">
            <span></span>
          </div>
          <p class="text">나는 지금,</p>
          <ul>
            <li><button>단맛</button></li>
            <li><button>매운맛</button></li>
            <li><button>담백한 맛</button></li>
          </ul>
          <p class="text">이 땡긴다!</p>
          <img src="/img/bgImg/tastingImg2.png" alt="tasting img" class="tastingImg">
          <div class="flexCenter prevNextBtn">
            <button class="prevBtn smapleTest2BackBtn">이전</button>
            <button class="nextBtn smapleTest2Btn">다음</button>
          </div>
        </div>
        <img src="/img/bgImg/foodImg3.png" alt="food img" class="foodImg foodImg3">
        <img src="/img/bgImg/foodImg4.png" alt="food img" class="foodImg foodImg4">
      </div>
      <div class="smapleTest smapleTest3 ">
        <div class="flexCol flexCenter">
          <p class="textTop">잠시만 기다려주세요</p>
          <p><span>모두의 요리</span>가</p>
          <p>레시피를 고르고있습니다</p>
          <img src="/img/logo2.png" alt="logo img" class="logoImg">
          <p class="text">후라이팬에 기름 두르는중.....</p>
          <button class="smapleTest3Btn">취소</button>
          <img src="/img/bgImg/foodImg3.png" alt="food img" class="foodImg foodImg3">
          <img src="/img/bgImg/foodImg2.png" alt="food img" class="foodImg foodImg2">
        </div>
      </div>
      <div class="smapleTest smapleTest4 ">
        <div class="flexCol flexCenter">
          <p>지금 내가 꼭 먹어야 할 메뉴는..</p>
          <div class="smapleTestSlide">
            <div class="swiper mySwiper">
              <div class="swiper-wrapper">
                <div class="swiper-slide">
                  <img src="/img/Sample_img/food.png" alt="food img">
                  <div class="slideText">
                    <p>생일이 아닌날에도 건강하게 챙겨먹자</p>
                    <p class="foodName">핫케잌 붕어빵</p>
                  </div>
                </div>
                <div class="swiper-slide">
                  <img src="/img/Sample_img/food.png" alt="food img">
                  <div class="slideText">
                    <p>생일이 아닌날에도 건강하게 챙겨먹자</p>
                    <p class="foodName">핫케잌 붕어빵</p>
                  </div>
                </div>
                <div class="swiper-slide">
                  <img src="/img/Sample_img/food.png" alt="food img">
                  <div class="slideText">
                    <p>생일이 아닌날에도 건강하게 챙겨먹자</p>
                    <p class="foodName">핫케잌 붕어빵</p>
                  </div>
                </div>
              </div>
              <div class="swiper-pagination"></div>
            </div>
          </div>
          <img src="/img/bgImg/tastingImg2.png" alt="tasting img">
          <div class="flexCenter prevNextBtn">
            <button class="prevBtn homeBtn">홈</button>
            <button class="nextBtn smapleTest4Btn">테스트 다시하기</button>
          </div>
        </div>
      </div>
    </section>
    <img src="/img/bgImg/tastingBg1.png" alt="background img" class="bgImg bgImg1">
    <img src="/img/bgImg/tastingBg2.png" alt="background img" class="bgImg bgImg2">
    <img src="/img/bgImg/tastingBg3.png" alt="background img" class="bgImg bgImg3">
  </main>

  <!-- script -->
  <script src="/js/common/swiper-bundle.min.js"></script>
  <script src="/js/common/header.js"></script>
  <script src="/js/pages/tasting.js"></script>
</body>
</html>
