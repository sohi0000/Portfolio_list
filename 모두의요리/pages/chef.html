<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common/global.css">

  <title>모두의 요리</title>

        </li>
        <li class="flexCol flexBetween">

          <a href="/pages/chefDetail.html?id=0">
            <img src="/img/Sample_img/chef.png" alt="chef image" class="chefImg">
          </a>
          <p class="headlineText chefId">다이어트레시피왕</p>
          <button class="footerText subBtn">구독</button>
        </li>
      </ul>
    </section>
    <section class="chefList">
      <div class="chefTitle flexBetween">
        <p class="largeTitle">
          <span class="largeTitle">셰프 목록</span>
          <span class="chefCount">464</span>
        </p>
        <div class="flexBetween">

            <img src="/img/icon/filter.png" alt="인기순 필터 아이콘">
