<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/common/global.css">
  <link rel="stylesheet" href="/css/pages/customerInquiry.css">
  <title>모두의 요리</title>
</head>
<body>
  <header id="header"></header>
  
  <main>
    <section class="banner">
      <div class="innerMain flex">
        <p class="largeTitle">고객 문의</p>
        <img src="/img/bannerImg/ciBanner1.png" alt="banner img" class="bannerImg1">
        <img src="/img/bannerImg/ciBanner2.png" alt="banner img" class="bannerImg2">
      </div>
    </section>
    <section class="inquiry innerMain">
      <div class="search flexEnd">
        <input type="text" placeholder="제목 또는 내용 혹은 작성자명을 입력해주세요.">
        <button>
          <img src="/img/icon/searchG.png" alt="search icon">
        </button>
      </div>
      <div class="inquiryList">
        <div class="tableName flex">
          <p class="postNum">번호</p>
          <p class="postTitle">제목</p>
          <p class="postUser">작성자명</p>
          <p class="postDate">등록일</p>
          <p class="postStatus">상태</p>
        </div>
        <ul>
          <!-- <li class="tableList flex">
            <p class="postNum">1</p>
            <p class="postTitle">공지사항 제목입니다.</p>
            <p class="postUser">요리왕</p>
            <p class="postDate">2024.01.30</p>
            <p class="postStatus">대기중</p>
          </li> -->
        </ul>
        <div id="pagination" class="flexCenter"></div>
      </div>
    </section>
  </main>

  <footer id="footer"></footer>
  <!-- script -->
  <script src="/js/common/jquery-4.0.0.min.js"></script>
  <script src="/js/common/pagination.min.js"></script>
  <script src="/js/common/header.js"></script>
  <script src="/js/common/footer.js"></script>
  <script type="module" src="/js/pages/customerInquiry.js"></script>
</body>
</html>
